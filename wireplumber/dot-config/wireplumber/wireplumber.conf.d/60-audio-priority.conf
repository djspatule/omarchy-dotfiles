monitor.alsa.rules = [
  {
    matches = [
      {
        node.name = "alsa_output.pci-0000_00_1f.3-platform-skl_hda_dsp_generic.HiFi__Headphones__sink"
      }
    ]
    actions = {
      update-props = {
        priority.session = 1200
      }
    }
  }
  {
    matches = [
      {
        node.name = "alsa_output.pci-0000_00_1f.3-platform-skl_hda_dsp_generic.HiFi__Speaker__sink"
      }
    ]
    actions = {
      update-props = {
        priority.session = 900
      }
    }
  }
  {
    matches = [
      {
        node.name = "~alsa_output.pci-0000_00_1f.3-platform-skl_hda_dsp_generic.HiFi__HDMI.*__sink"
      }
    ]
    actions = {
      update-props = {
        priority.session = 100
      }
    }
  }
  {
    matches = [
      {
        node.name = "alsa_input.pci-0000_00_1f.3-platform-skl_hda_dsp_generic.HiFi__Mic2__source"
      }
    ]
    actions = {
      update-props = {
        priority.session = 2200
      }
    }
  }
  {
    matches = [
      {
        node.name = "alsa_input.pci-0000_00_1f.3-platform-skl_hda_dsp_generic.HiFi__Mic1__source"
      }
    ]
    actions = {
      update-props = {
        priority.session = 1800
      }
    }
  }
  {
    matches = [
      {
        node.name = "alsa_input.usb-046d_HD_Pro_Webcam_C920-02.analog-stereo"
      }
    ]
    actions = {
      update-props = {
        priority.session = 1200
      }
    }
  }
]

monitor.bluez.rules = [
  {
    matches = [
      {
        node.name = "~bluez_output[.].*"
      }
    ]
    actions = {
      update-props = {
        priority.session = 1000
      }
    }
  }
]
